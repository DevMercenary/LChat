# Flathub submission manifest для LChat.
#
# Готово к отправке: собирает БЕЗ доступа к сети (offline) из git-тега репозитория,
# все зависимости берутся из cargo-sources.json (сгенерирован из Cargo.lock).
#
# Как отправить (кратко, подробности — в ../PUBLISHING.md):
#   1) форкнуть github.com/flathub/flathub, ветка new-pr
#   2) положить туда этот файл и cargo-sources.json (рядом)
#   3) открыть Pull Request
#
# Локальная проверка перед PR (нужен flatpak-builder):
#   flatpak-builder --user --install --force-clean build-dir \
#     packaging/flathub/io.github.DevMercenary.LChat.yaml
app-id: io.github.DevMercenary.LChat
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: lchat

finish-args:
  - --share=network            # прямые TCP/UDP соединения по локальной сети
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home          # приём файлов и выбор файлов для отправки

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/lchat/cargo

modules:
  - name: lchat
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/lchat /app/bin/lchat
      - install -Dm644 packaging/io.github.DevMercenary.LChat.desktop
          /app/share/applications/io.github.DevMercenary.LChat.desktop
      - install -Dm644 packaging/io.github.DevMercenary.LChat.metainfo.xml
          /app/share/metainfo/io.github.DevMercenary.LChat.metainfo.xml
      - install -Dm644 packaging/icons/hicolor/scalable/apps/io.github.DevMercenary.LChat.svg
          /app/share/icons/hicolor/scalable/apps/io.github.DevMercenary.LChat.svg
      - for s in 16 32 48 64 128 256 512; do
          install -Dm644 "packaging/icons/hicolor/${s}x${s}/apps/io.github.DevMercenary.LChat.png"
            "/app/share/icons/hicolor/${s}x${s}/apps/io.github.DevMercenary.LChat.png";
          done
    sources:
      - type: git
        url: https://github.com/DevMercenary/LChat.git
        tag: v0.1.0
        commit: 72d7036e7ad93433768e287e7e29502fae7b3a9c
      - cargo-sources.json
